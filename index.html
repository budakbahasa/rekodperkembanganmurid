        const SenaraiRekod = ({ records, config, onRecordUpdated, onRecordDeleted, showToast }) => {
            const [filterClass, setFilterClass] = useState(config.classes[0] || '');
            const [filterSubject, setFilterSubject] = useState(config.subjects[0] || '');
            const [isEditing, setIsEditing] = useState(null);
            const [editResults, setEditResults] = useState({});
            const [isSaving, setIsSaving] = useState(false);

            const filteredRecords = records.filter(r => r.kelas === filterClass && r.subjek === filterSubject).sort((a, b) => new Date(b.tarikh) - new Date(a.tarikh));

            const handleDelete = async (id) => {
                if(!window.confirm("Adakah anda pasti untuk memadam rekod ini secara kekal?")) return;
                try {
                    const response = await fetch(GAS_URL, {
                        method: 'POST', body: JSON.stringify({ action: 'deleteAssessment', id: id })
                    });
                    const resData = await response.json();
                    if(resData.success) {
                        showToast('Rekod berjaya dipadam', 'success');
                        onRecordDeleted(id);
                    } else throw new Error(resData.error);
                } catch(e) { showToast('Ralat memadam: ' + e.message, 'error'); }
            };

            const openEdit = (record) => {
                const resultsMap = {};
                record.results.forEach(res => {
                    let val = res.tp;
                    if(record.stdKandungan === 'MARKAH UJIAN' && val.includes('%')) {
                        val = val.split('%')[0];
                    }
                    resultsMap[res.studentId] = val === 'Belum Dinilai' ? '' : val;
                });
                setEditResults(resultsMap);
                setIsEditing({ ...record });
            };

            const handleSaveEdit = async () => {
                setIsSaving(true);
                try {
                    const studentsData = config.students[isEditing.kelas] || [];
                    const detailedResults = Object.keys(editResults).map(studentId => {
                        const student = studentsData.find(s => s.id === studentId);
                        let tpValue = editResults[studentId] || 'Belum Dinilai';
                        
                        if(isEditing.stdKandungan === 'MARKAH UJIAN' && tpValue !== 'Belum Dinilai') {
                            const info = getGradeInfo(tpValue);
                            tpValue = `${tpValue}% [${info.grade}]`;
                        }
                        return { studentId, studentName: student ? student.name : 'Unknown', tp: tpValue };
                    });

                    const updatedRecord = { ...isEditing, results: detailedResults };
                    
                    const response = await fetch(GAS_URL, {
                        method: 'POST', body: JSON.stringify({ action: 'updateAssessment', id: isEditing.id, assessment: updatedRecord })
                    });
                    const resData = await response.json();
                    if(resData.success) {
                        showToast('Rekod berjaya dikemas kini', 'success');
                        onRecordUpdated(updatedRecord);
                        setIsEditing(null);
                    } else throw new Error(resData.error);
                } catch(e) { showToast('Ralat kemas kini: ' + e.message, 'error'); }
                finally { setIsSaving(false); }
            };

            return (
                <div className="bg-white rounded-2xl shadow-soft border border-gray-100 p-8 fade-in relative">
                    <div className="flex items-center gap-4 mb-8 border-b border-gray-100 pb-6 mt-2">
                        <div className="bg-gradient-to-tr from-purple-500 to-pink-500 text-white w-12 h-12 rounded-xl flex items-center justify-center shadow-lg"><i className="fas fa-list-ul text-xl"></i></div>
                        <div>
                            <h2 className="text-2xl font-bold text-gray-800">Urus & Sunting Rekod</h2>
                            <p className="text-gray-500 text-sm font-medium">Senarai semua rekod. Anda boleh menyunting atau memadam rekod di sini.</p>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 bg-purple-50/50 p-6 rounded-2xl border border-purple-100 shadow-inner">
                        <div>
                            <label className="block text-xs font-extrabold text-purple-800 mb-2 uppercase tracking-wider">Pilih Kelas</label>
                            <select value={filterClass} onChange={e => setFilterClass(e.target.value)} className="w-full p-3 border border-purple-200 rounded-xl focus:ring-2 focus:ring-purple-500 bg-white font-bold text-gray-800 outline-none shadow-sm">
                                {config.classes.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                        </div>
                        <div>
                            <label className="block text-xs font-extrabold text-purple-800 mb-2 uppercase tracking-wider">Pilih Subjek</label>
                            <select value={filterSubject} onChange={e => setFilterSubject(e.target.value)} className="w-full p-3 border border-purple-200 rounded-xl focus:ring-2 focus:ring-purple-500 bg-white font-bold text-gray-800 outline-none shadow-sm">
                                {config.subjects.map(s => <option key={s} value={s}>{s}</option>)}
                            </select>
                        </div>
                    </div>

                    {!isEditing ? (
                        <div className="overflow-x-auto rounded-xl border border-gray-200 shadow-sm">
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="bg-gray-100 text-gray-700">
                                        <th className="py-4 px-4 font-bold text-sm border-b border-gray-200 w-24">Tarikh</th>
                                        <th className="py-4 px-4 font-bold text-sm border-b border-gray-200">Topik / Ujian</th>
                                        <th className="py-4 px-4 font-bold text-sm border-b border-gray-200 w-32 text-center">Jenis</th>
                                        <th className="py-4 px-4 font-bold text-sm border-b border-gray-200 w-32 text-center">Tindakan</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-gray-100 bg-white">
                                    {filteredRecords.length > 0 ? filteredRecords.map(r => (
                                        <tr key={r.id} className="hover:bg-purple-50/30 transition-colors">
                                            <td className="py-3 px-4 text-sm font-semibold text-gray-600">{formatMYDate(r.tarikh)}</td>
                                            <td className="py-3 px-4">
                                                <div className="font-bold text-gray-800">{r.stdPembelajaran}</div>
                                                <div className="text-xs text-gray-500">{r.stdKandungan}</div>
                                            </td>
                                            <td className="py-3 px-4 text-center">
                                                <span className={`text-xs font-bold px-2 py-1 rounded ${r.stdKandungan === 'MARKAH UJIAN' ? 'bg-indigo-100 text-indigo-700' : 'bg-teal-100 text-teal-700'}`}>
                                                    {r.stdKandungan === 'MARKAH UJIAN' ? 'Sumatif' : 'Formatif'}
                                                </span>
                                            </td>
                                            <td className="py-3 px-4 text-center space-x-2">
                                                <button onClick={() => openEdit(r)} className="text-blue-500 hover:text-white hover:bg-blue-500 p-2 rounded-lg border border-transparent hover:border-blue-500 transition"><i className="fas fa-edit"></i></button>
                                                <button onClick={() => handleDelete(r.id)} className="text-red-500 hover:text-white hover:bg-red-500 p-2 rounded-lg border border-transparent hover:border-red-500 transition"><i className="fas fa-trash"></i></button>
                                            </td>
                                        </tr>
                                    )) : <tr><td colSpan="4" className="py-8 text-center text-gray-500 italic">Tiada rekod ditemui untuk kelas dan subjek ini.</td></tr>}
                                </tbody>
                            </table>
                        </div>
                    ) : (
                        <div className="bg-gray-50 p-6 rounded-xl border border-purple-200 shadow-inner">
                            <div className="flex justify-between items-center mb-6">
                                <h3 className="text-lg font-bold text-gray-800">Sunting Rekod: <span className="text-purple-600">{isEditing.stdPembelajaran}</span></h3>
                                <button onClick={() => setIsEditing(null)} className="text-gray-500 hover:text-gray-800 font-bold"><i className="fas fa-times mr-1"></i> Batal</button>
                            </div>
                            
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
                                <div><label className="block text-xs font-bold text-gray-500 mb-1">Tarikh</label><input type="date" value={isEditing.tarikh} onChange={(e) => setIsEditing({...isEditing, tarikh: e.target.value})} className="w-full p-2.5 border border-gray-300 rounded-lg outline-none" /></div>
                                <div><label className="block text-xs font-bold text-gray-500 mb-1">Topik/Ujian</label><input type="text" value={isEditing.stdPembelajaran} onChange={(e) => setIsEditing({...isEditing, stdPembelajaran: e.target.value})} className="w-full p-2.5 border border-gray-300 rounded-lg outline-none font-bold text-gray-800" /></div>
                            </div>

                            <table className="w-full text-left bg-white rounded-lg overflow-hidden shadow-sm border border-gray-200 mb-6">
                                <thead><tr className="bg-gray-100"><th className="py-3 px-4 font-bold text-sm">Nama Murid</th><th className="py-3 px-4 font-bold text-sm w-48 text-center">Pencapaian</th></tr></thead>
                                <tbody className="divide-y divide-gray-100">
                                    {config.students[isEditing.kelas] && config.students[isEditing.kelas].map(student => (
                                        <tr key={student.id}>
                                            <td className="py-2 px-4 font-bold text-sm text-gray-800">{student.name}</td>
                                            <td className="py-2 px-4">
                                                {isEditing.stdKandungan === 'MARKAH UJIAN' ? (
                                                    <input type="number" min="0" max="100" placeholder="-" value={editResults[student.id] || ''} onChange={(e) => setEditResults({...editResults, [student.id]: e.target.value})} className="w-full p-2 text-center border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none font-bold" />
                                                ) : (
                                                    <select value={editResults[student.id] || ''} onChange={(e) => setEditResults({...editResults, [student.id]: e.target.value})} className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none font-bold text-sm">
                                                        <option value="">-</option>
                                                        {TP_OPTIONS.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                                                    </select>
                                                )}
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>

                            <div className="flex justify-end gap-3">
                                <button onClick={() => setIsEditing(null)} className="px-6 py-2.5 rounded-lg bg-white border border-gray-300 font-bold text-gray-600 hover:bg-gray-100">Batal</button>
                                <button onClick={handleSaveEdit} disabled={isSaving} className="px-6 py-2.5 rounded-lg bg-purple-600 text-white font-bold hover:bg-purple-700 flex items-center gap-2">
                                    {isSaving ? <i className="fas fa-spinner fa-spin"></i> : <i className="fas fa-save"></i>} Simpan Perubahan
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const DashboardAnalisis = ({ records, config }) => {
            const [filterClass, setFilterClass] = useState(config.classes[0] || '');
            const [filterSubject, setFilterSubject] = useState(config.subjects[0] || '');
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');
            const [viewMode, setViewMode] = useState('PBD');
            const [selectedCols, setSelectedCols] = useState([]);

            useEffect(() => { setSelectedCols([]); }, [filterClass, filterSubject, startDate, endDate, viewMode]);

            const totalStudents = useMemo(() => config.students[filterClass]?.length || 0, [config, filterClass]);
            
            const passDateFilter = (recDateStr) => {
                if (!startDate && !endDate) return true;
                const rDate = new Date(recDateStr);
                rDate.setHours(0,0,0,0);
                if (startDate) { const sDate = new Date(startDate); sDate.setHours(0,0,0,0); if (rDate < sDate) return false; }
                if (endDate) { const eDate = new Date(endDate); eDate.setHours(0,0,0,0); if (rDate > eDate) return false; }
                return true;
            };

            const totalRecords = useMemo(() => records.filter(r => r.kelas === filterClass && r.subjek === filterSubject && passDateFilter(r.tarikh)).length, [records, filterClass, filterSubject, startDate, endDate]);

            const matrixDataPBD = useMemo(() => {
                let filtered = [];
                records.forEach(r => {
                    if(r.stdKandungan !== 'MARKAH UJIAN' && passDateFilter(r.tarikh)) {
                        r.results.forEach(res => {
                            if (res.tp && res.tp !== 'Belum Dinilai' && res.tp !== '') {
                                if (r.kelas === filterClass && r.subjek === filterSubject) {
                                    filtered.push({ tarikh: r.tarikh, stdKandungan: r.stdKandungan, stdPembelajaran: r.stdPembelajaran, kemahiran: r.kemahiran, studentName: res.studentName, tp: res.tp });
                                }
                            }
                        });
                    }
                });

                const colsMap = {};
                filtered.forEach(item => { 
                    if (!colsMap[item.stdPembelajaran]) {
                        colsMap[item.stdPembelajaran] = { sp: item.stdPembelajaran, kemahiran: item.kemahiran, isTPKeseluruhan: item.stdPembelajaran.includes('TP KESELURUHAN') }; 
                    } 
                });

                const syllabusList = (config.syllabus && config.syllabus[filterSubject]) || [];
                const kemahiranSPSortKey = {};
                syllabusList.forEach(item => {
                    if (!kemahiranSPSortKey[item.kemahiran]) {
                        kemahiranSPSortKey[item.kemahiran] = item.sp;
                    } else if (compareSP(item.sp, kemahiranSPSortKey[item.kemahiran]) < 0) {
                        kemahiranSPSortKey[item.kemahiran] = item.sp;
                    }
                });

                const columns = Object.values(colsMap).sort((a, b) => {
                    const kemA_min = kemahiranSPSortKey[a.kemahiran] || a.sp;
                    const kemB_min = kemahiranSPSortKey[b.kemahiran] || b.sp;
                    
                    const kemCmp = compareSP(kemA_min, kemB_min);
                    if (kemCmp !== 0) return kemCmp;

                    const getTypeWeight = (col) => {
                        if (col.sp.includes('TP KESELURUHAN (PAT)')) return 4;
                        if (col.sp.includes('TP KESELURUHAN (PPT)')) return 3;
                        if (col.sp.includes('TP KESELURUHAN')) return 2;
                        return 1;
                    };
                    const weightA = getTypeWeight(a); const weightB = getTypeWeight(b);
                    if (weightA !== weightB) return weightA - weightB;

                    return compareSP(a.sp, b.sp);
                });

                const rowsMap = {};
                filtered.forEach(item => {
                    const rowKey = item.studentName;
                    if (!rowsMap[rowKey]) rowsMap[rowKey] = { studentName: item.studentName, kelas: filterClass, results: {} };
                    if (!rowsMap[rowKey].results[item.stdPembelajaran]) rowsMap[rowKey].results[item.stdPembelajaran] = [];
                    
                    const exists = rowsMap[rowKey].results[item.stdPembelajaran].find(x => x.tp === item.tp && x.tarikh === item.tarikh);
                    if(!exists) rowsMap[rowKey].results[item.stdPembelajaran].push({ tp: item.tp, tarikh: item.tarikh });
                });

                const rows = Object.values(rowsMap).sort((a, b) => a.studentName.localeCompare(b.studentName));
                return { columns, rows };
            }, [records, filterClass, filterSubject, startDate, endDate]);

            const matrixDataSumatif = useMemo(() => {
                let filtered = [];
                records.forEach(r => {
                    if(r.stdKandungan === 'MARKAH UJIAN' && passDateFilter(r.tarikh)) {
                        r.results.forEach(res => {
                            if (res.tp && res.tp !== 'Belum Dinilai' && res.tp !== '') {
                                if (r.kelas === filterClass && r.subjek === filterSubject) {
                                    filtered.push({ tarikh: r.tarikh, ujian: r.stdPembelajaran, studentName: res.studentName, markahStr: res.tp });
                                }
                            }
                        });
                    }
                });

                const colsMap = {};
                filtered.forEach(item => { if (!colsMap[item.ujian]) colsMap[item.ujian] = item.ujian; });
                const columns = Object.values(colsMap).sort((a, b) => new Date(filtered.find(x=>x.ujian===a).tarikh) - new Date(filtered.find(x=>x.ujian===b).tarikh));

                const rowsMap = {};
                filtered.forEach(item => {
                    const rowKey = item.studentName;
                    if (!rowsMap[rowKey]) rowsMap[rowKey] = { studentName: item.studentName, kelas: filterClass, results: {} };
                    const rawM = item.markahStr.split('%')[0];
                    rowsMap[rowKey].results[item.ujian] = { str: item.markahStr, markah: rawM, tarikh: item.tarikh, info: getGradeInfo(rawM) };
                });
                const rows = Object.values(rowsMap).sort((a, b) => a.studentName.localeCompare(b.studentName));
                return { columns, rows };
            }, [records, filterClass, filterSubject, startDate, endDate]);

            const downloadPDF = () => {
                const element = document.getElementById(viewMode === 'PBD' ? 'dashboard-print-area' : 'sumatif-print-area');
                element.classList.add('force-black-print'); 

                const title = viewMode === 'PBD' ? 'Rekod_Perkembangan_Murid' : 'Laporan_Markah_Ujian';
                const opt = {
                    margin: [10, 10, 10, 10], filename: `${title}_${filterClass}_${getMYDate()}.pdf`,
                    image: { type: 'jpeg', quality: 1.0 },
                    html2canvas: { scale: 3, useCORS: true, ignoreElements: (n) => n.classList.contains('no-print') }, 
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
                };
                
                setTimeout(() => {
                    window.html2pdf().set(opt).from(element).save().then(() => {
                        element.classList.remove('force-black-print'); 
                    });
                }, 150);
            };

            const headerDateText = (startDate && endDate) ? `Tarikh: ${formatMYDate(startDate)} hingga ${formatMYDate(endDate)}` :
                                   (startDate) ? `Bermula dari: ${formatMYDate(startDate)}` :
                                   (endDate) ? `Sehingga: ${formatMYDate(endDate)}` : 'Keseluruhan Rekod Semasa';

            const displayColumns = selectedCols.length > 0 ? matrixDataPBD.columns.filter(c => selectedCols.includes(c.sp)) : matrixDataPBD.columns;

            return (
                <div className="space-y-6 fade-in print-area">
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-2 no-print">
                        <div className="bg-gradient-to-br from-teal-500 to-teal-700 rounded-2xl p-6 text-white shadow-lg relative overflow-hidden">
                            <div className="absolute -right-4 -top-4 opacity-20 text-8xl"><i className="fas fa-users"></i></div>
                            <h3 className="font-semibold text-teal-100 text-sm mb-1 uppercase tracking-widest">Jumlah Murid</h3>
                            <div className="text-4xl font-black">{totalStudents}</div>
                            <div className="mt-2 text-xs text-teal-200 font-bold bg-black/20 inline-block px-2 py-1 rounded">Dalam Kelas: {filterClass || '-'}</div>
                        </div>
                        <div className="bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl p-6 text-white shadow-lg relative overflow-hidden">
                            <div className="absolute -right-4 -top-4 opacity-20 text-8xl"><i className="fas fa-book"></i></div>
                            <h3 className="font-semibold text-blue-100 text-sm mb-1 uppercase tracking-widest">Subjek Analisis</h3>
                            <div className="text-2xl font-black truncate">{filterSubject || 'Sila Pilih'}</div>
                            <div className="mt-2 text-xs text-blue-200 font-bold bg-black/20 inline-block px-2 py-1 rounded">Keseluruhan SP/SK</div>
                        </div>
                        <div className="bg-gradient-to-br from-orange-400 to-rose-500 rounded-2xl p-6 text-white shadow-lg relative overflow-hidden">
                            <div className="absolute -right-4 -top-4 opacity-20 text-8xl"><i className="fas fa-database"></i></div>
                            <h3 className="font-semibold text-orange-100 text-sm mb-1 uppercase tracking-widest">Total Sesi Direkod</h3>
                            <div className="text-4xl font-black">{totalRecords}</div>
                            <div className="mt-2 text-xs text-rose-200 font-bold bg-black/20 inline-block px-2 py-1 rounded">Mengikut Tapisan Tarikh</div>
                        </div>
                    </div>

        const SlipIndividu = ({ records, config }) => {
            const [selClass, setSelClass] = useState('');
            const [selStudent, setSelStudent] = useState('');

            useEffect(() => { if (config.classes.length > 0 && !selClass) setSelClass(config.classes[0]); }, [config.classes, selClass]);
            useEffect(() => {
                if (selClass && config.students[selClass] && config.students[selClass].length > 0) {
                    const currentList = config.students[selClass];
                    if(!currentList.find(s => s.id === selStudent)) setSelStudent(currentList[0].id);
                } else setSelStudent('');
            }, [selClass, config.students, selStudent]);

            const studentInfo = useMemo(() => {
                if(!selStudent || !selClass) return null;
                return (config.students[selClass] || []).find(s => s.id === selStudent);
            }, [selClass, selStudent, config.students]);

            const { pbdRecords, sumatifRecords } = useMemo(() => {
                if(!selStudent) return { pbdRecords: [], sumatifRecords: [] };
                const pbd = []; const sumatif = [];
                records.forEach(r => {
                    const sRes = r.results.find(res => res.studentId === selStudent);
                    if(sRes && sRes.tp !== '' && sRes.tp !== 'Belum Dinilai') {
                        const rec = { tarikh: r.tarikh, subjek: r.subjek, kandungan: `${r.stdKandungan} / ${r.stdPembelajaran}`, kemahiran: r.kemahiran, tp: sRes.tp };
                        if(r.stdKandungan === 'MARKAH UJIAN') {
                            const rawMarkah = sRes.tp.split('%')[0];
                            sumatif.push({ tarikh: r.tarikh, subjek: r.subjek, ujian: r.stdPembelajaran, markah: sRes.tp, info: getGradeInfo(rawMarkah) });
                        } else { pbd.push(rec); }
                    }
                });
                return { 
                    pbdRecords: pbd.sort((a,b) => (a.subjek||'').localeCompare(b.subjek||'') || new Date(b.tarikh) - new Date(a.tarikh)),
                    sumatifRecords: sumatif.sort((a,b) => (a.subjek||'').localeCompare(b.subjek||'') || new Date(b.tarikh) - new Date(a.tarikh))
                };
            }, [records, selStudent]);

            const downloadPDF = () => {
                if(!studentInfo) return;
                const element = document.getElementById('slip-print-content');
                element.classList.add('force-black-print');

                const opt = {
                    margin: [15, 15, 15, 15], filename: `Slip_${studentInfo.name.replace(/\s+/g, '_')}_${getMYDate()}.pdf`,
                    image: { type: 'jpeg', quality: 1.0 }, 
                    html2canvas: { scale: 3, useCORS: true },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };
                
                setTimeout(() => {
                    window.html2pdf().set(opt).from(element).save().then(() => {
                        element.classList.remove('force-black-print');
                    });
                }, 150);
            };

            return (
                <div className="bg-white rounded-2xl shadow-soft border border-gray-100 p-8 print-area fade-in">
                    <div className="flex flex-col md:flex-row justify-between items-center mb-8 border-b border-gray-100 pb-6 gap-4 no-print">
                        <h2 className="text-2xl font-bold text-gray-800 flex items-center"><i className="fas fa-file-invoice text-rose-500 mr-3 text-3xl"></i> Slip Individu Percetakan</h2>
                        <button onClick={downloadPDF} className="bg-gradient-to-r from-rose-500 to-red-600 hover:from-rose-600 hover:to-red-700 text-white px-6 py-2.5 rounded-xl shadow-md font-bold text-sm flex items-center gap-2 transform hover:-translate-y-0.5 transition disabled:opacity-50 disabled:cursor-not-allowed" disabled={!studentInfo}>
                            <i className="fas fa-file-pdf"></i> Muat Turun PDF
                        </button>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10 no-print bg-gray-50/80 p-6 rounded-2xl border border-gray-100 shadow-inner">
                        <div>
                            <label className="block text-xs font-extrabold text-gray-500 mb-2 uppercase tracking-wider">Pilih Kelas</label>
                            <select value={selClass} onChange={e => setSelClass(e.target.value)} className="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-rose-500 outline-none bg-white font-bold text-gray-800 shadow-sm">
                                {config.classes.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                        </div>
                        <div>
                            <label className="block text-xs font-extrabold text-gray-500 mb-2 uppercase tracking-wider">Pilih Nama Murid</label>
                            <select value={selStudent} onChange={e => setSelStudent(e.target.value)} className="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-rose-500 outline-none bg-white font-bold text-gray-800 shadow-sm disabled:bg-gray-100" disabled={!studentInfo}>
                                {(config.students[selClass] || []).map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                            </select>
                        </div>
                    </div>

                    {studentInfo ? (
                        <div id="slip-print-content" className="border-4 border-double border-gray-300 p-10 rounded-2xl relative max-w-4xl mx-auto bg-white shadow-xl mb-10">
                            
                            <div className="text-center mb-10 border-b-2 border-gray-200 pb-8 pt-4">
                                <h1 className="text-3xl font-black uppercase tracking-widest text-gray-900 mb-1">Slip Keputusan Murid</h1>
                                <p className="text-gray-800 font-bold uppercase tracking-wider text-sm">Pentaksiran Bilik Darjah & Ujian Sumatif</p>
                            </div>

                            <div className="grid grid-cols-2 gap-6 mb-10 text-sm">
                                <div className="bg-gray-50 p-5 rounded-xl border border-gray-100 shadow-sm"><p className="text-gray-800 font-extrabold uppercase tracking-wider mb-1 text-xs">Nama Murid</p><p className="font-black text-xl text-gray-900 uppercase">{studentInfo.name}</p></div>
                                <div className="bg-gray-50 p-5 rounded-xl border border-gray-100 shadow-sm"><p className="text-gray-800 font-extrabold uppercase tracking-wider mb-1 text-xs">Kelas</p><p className="font-black text-xl text-gray-900 uppercase">{selClass}</p></div>
                            </div>

                            <h3 className="font-extrabold text-gray-900 text-lg mb-4 border-l-4 border-teal-500 pl-3 uppercase tracking-wider">BAHAGIAN A: Pentaksiran Bilik Darjah (PBD)</h3>
                            {pbdRecords.length > 0 ? (
                                <table className="w-full text-left border-collapse border border-gray-300 mb-10 rounded-lg overflow-hidden shadow-sm">
                                    <thead><tr className="bg-teal-50"><th className="py-3 px-4 border border-gray-300 font-extrabold text-sm w-24 text-gray-900">Tarikh</th><th className="py-3 px-4 border border-gray-300 font-extrabold text-sm w-48 text-gray-900">Subjek</th><th className="py-3 px-4 border border-gray-300 font-extrabold text-sm text-gray-900">Standard Kandungan/Pembelajaran</th><th className="py-3 px-4 border border-gray-300 font-extrabold text-sm text-center w-20 text-gray-900">TP</th></tr></thead>
                                    <tbody className="bg-white">
                                        {pbdRecords.map((r, i) => (
                                            <tr key={i} className="hover:bg-gray-50">
                                                <td className="py-3 px-4 border border-gray-300 text-sm font-bold text-gray-800 whitespace-nowrap">{formatMYDate(r.tarikh)}</td>
                                                <td className="py-3 px-4 border border-gray-300 text-sm font-black text-gray-900">{r.subjek}</td>
                                                <td className="py-3 px-4 border border-gray-300 text-sm"><div className="font-bold text-gray-900 mb-1">{r.kandungan}</div><div className="text-[10px] text-gray-800 font-bold uppercase tracking-wider">{r.kemahiran}</div></td>
                                                <td className="py-3 px-4 border border-gray-300 text-sm font-black text-center text-teal-900 bg-teal-50/30">{r.tp}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            ) : <div className="text-center py-6 bg-gray-50 border border-gray-200 rounded-xl text-gray-800 font-bold italic mb-10">Tiada rekod PBD ditemui.</div>}

                            <h3 className="font-extrabold text-gray-900 text-lg mb-4 border-l-4 border-indigo-500 pl-3 uppercase tracking-wider mt-6">BAHAGIAN B: Pencapaian Ujian (Sumatif)</h3>
                            {sumatifRecords.length > 0 ? (
                                <table className="w-full text-left border-collapse border border-gray-300 rounded-lg overflow-hidden shadow-sm">
                                    <thead><tr className="bg-indigo-50"><th className="py-3 px-4 border border-gray-300 font-extrabold text-sm w-24 text-gray-900">Tarikh</th><th className="py-3 px-4 border border-gray-300 font-extrabold text-sm w-48 text-gray-900">Subjek</th><th className="py-3 px-4 border border-gray-300 font-extrabold text-sm text-gray-900">Nama Ujian</th><th className="py-3 px-4 border border-gray-300 font-extrabold text-sm text-center w-32 text-gray-900">Markah & Gred</th></tr></thead>
                                    <tbody className="bg-white">
                                        {sumatifRecords.map((r, i) => (
                                            <tr key={i} className="hover:bg-gray-50">
                                                <td className="py-3 px-4 border border-gray-300 text-sm font-bold text-gray-800 whitespace-nowrap">{formatMYDate(r.tarikh)}</td>
                                                <td className="py-3 px-4 border border-gray-300 text-sm font-black text-gray-900">{r.subjek}</td>
                                                <td className="py-3 px-4 border border-gray-300 text-sm font-bold text-gray-900">{r.ujian}</td>
                                                <td className="py-3 px-4 border border-gray-300 text-sm text-center align-middle bg-indigo-50/30">
                                                    <div className="font-black text-lg text-indigo-900 mb-1">{r.markah.split(' ')[0]}</div>
                                                    <div className="text-[10px] font-extrabold uppercase bg-indigo-100 text-indigo-900 rounded px-2 py-1 inline-block">{r.info.grade} - {r.info.desc}</div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            ) : <div className="text-center py-6 bg-gray-50 border border-gray-200 rounded-xl text-gray-800 font-bold italic">Tiada rekod ujian ditemui.</div>}

                            <div className="mt-8 text-xs font-bold text-gray-900 bg-gray-50 p-3 rounded-lg border border-gray-200 inline-block w-full text-center">
                                <i className="fas fa-info-circle mr-1"></i> <span className="text-gray-900">PETUNJUK KESELURUHAN:</span> <strong className="text-red-700">BM</strong> (Belum Menguasai) &nbsp;|&nbsp; <strong className="text-amber-700">MDB</strong> (Menguasai Dengan Bimbingan) &nbsp;|&nbsp; <strong className="text-emerald-700">M</strong> (Menguasai)
                            </div>

                            <div className="mt-16 text-center text-xs font-bold text-gray-800 uppercase tracking-widest"><p>Dokumen ini dijana secara automatik pada {new Date().toLocaleString('ms-MY', { timeZone: 'Asia/Kuala_Lumpur' })}</p></div>
                        </div>
                    ) : <div className="text-center py-20 text-gray-400 bg-white border border-gray-100 rounded-2xl shadow-sm"><i className="fas fa-user-graduate text-5xl mb-4 text-gray-200"></i><h3 className="font-bold text-lg">Sila pilih murid di atas untuk menjana slip.</h3></div>}
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(() => {
                try {
                    const savedUser = localStorage.getItem('sistemPbdUser');
                    return savedUser ? JSON.parse(savedUser) : null;
                } catch { return null; }
            });
            const [activeTab, setActiveTab] = useState(() => {
                return localStorage.getItem('sistemPbdTab') || 'dashboard';
            });
            const [toast, setToast] = useState(null);
            const [records, setRecords] = useState([]);
            const [config, setConfig] = useState(null);
            const [loadingData, setLoadingData] = useState(true);

            useEffect(() => {
                const fetchGASData = async () => {
                    try {
                        const [confRes, recRes] = await Promise.all([
                            fetch(`${GAS_URL}?action=getConfig`).then(r => r.json()),
                            fetch(`${GAS_URL}?action=getAssessments`).then(r => r.json())
                        ]);
                        setConfig(confRes || { classes: [], subjects: [], students: {}, syllabus: {} });
                        setRecords(recRes || []);
                    } catch (e) { showToast("Sambungan ke Google Sheets terganggu.", "error"); } 
                    finally { setLoadingData(false); }
                };
                fetchGASData();
            }, []);

            // Auto-save State bila ada perubahan
            useEffect(() => {
                if (user) localStorage.setItem('sistemPbdUser', JSON.stringify(user));
                else localStorage.removeItem('sistemPbdUser');
            }, [user]);

            useEffect(() => {
                if (activeTab) localStorage.setItem('sistemPbdTab', activeTab);
            }, [activeTab]);

            const showToast = (message, type = 'info') => setToast({ message, type });
            const handleUpdateConfig = async (newConfig) => {
                try {
                    await fetch(GAS_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: 'updateConfig', config: newConfig }) });
                    setConfig(newConfig);
                } catch(e) { showToast('Ralat mengemaskini tetapan.', 'error'); }
            };
            const handleRecordAdded = (newRecord) => setRecords(prev => [...prev, newRecord]);
            const handleRecordUpdated = (updatedRecord) => setRecords(prev => prev.map(r => r.id === updatedRecord.id ? updatedRecord : r));
            const handleRecordDeleted = (id) => setRecords(prev => prev.filter(r => r.id !== id));

            const handleLogout = () => {
                localStorage.removeItem('sistemPbdUser');
                localStorage.removeItem('sistemPbdTab');
                window.location.reload();
            };

            if (loadingData) return (
                <div className="min-h-screen flex items-center justify-center bg-teal-50 flex-col gap-6 text-primary">
                    <div className="relative w-20 h-20">
                        <div className="absolute inset-0 border-4 border-teal-200 rounded-full"></div>
                        <div className="absolute inset-0 border-4 border-primary rounded-full border-t-transparent animate-spin"></div>
                    </div>
                    <p className="font-extrabold tracking-widest uppercase text-teal-700 animate-pulse text-sm">Menyambung ke Pangkalan Data...</p>
                </div>
            );
            
            if (!user) return <LoginScreen onLogin={(userData) => { 
                setUser(userData); 
                const savedTab = localStorage.getItem('sistemPbdTab');
                if(!savedTab || savedTab === 'undefined') setActiveTab(userData.role === 'admin' ? 'form' : 'dashboard'); 
                showToast(`Selamat datang!`, 'success'); 
            }} />;

            return (
                <div className="flex h-screen overflow-hidden bg-gray-100">
                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                    
                    <div className="w-64 bg-gradient-to-b from-dark via-[#064e3b] to-teal-900 text-white flex flex-col shadow-2xl no-print z-20 shrink-0 relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-32 h-32 bg-teal-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 transform translate-x-1/2 -translate-y-1/2"></div>
                        
                        <div className="p-6 flex flex-col items-center gap-3 bg-black/20 border-b border-teal-800/50 backdrop-blur-sm relative z-10">
                            <div className="bg-gradient-to-tr from-teal-400 to-white text-dark w-16 h-16 rounded-2xl flex items-center justify-center shadow-glow transform -rotate-3 transition hover:rotate-0"><i className="fas fa-graduation-cap text-3xl"></i></div>
                            <div className="text-center mt-2">
                                <h1 className="font-black text-lg tracking-wide text-white">SISTEM PBD</h1>
                                <p className="text-[10px] text-teal-300 mt-1 uppercase font-extrabold tracking-widest bg-teal-900/50 py-1 px-3 rounded-full">Disediakan Cikgu Amirul</p>
                            </div>
                        </div>

                        <div className="flex-1 py-6 px-4 space-y-2 overflow-y-auto relative z-10 custom-scrollbar">
                            <p className="text-xs font-bold text-teal-500 mb-3 px-2 uppercase tracking-widest">Menu Utama</p>
                            
                            {user.role === 'admin' && (
                                <>
                                    <button onClick={() => setActiveTab('form')} className={`w-full flex items-center gap-4 px-4 py-3.5 rounded-xl text-sm font-bold transition-all duration-300 ${activeTab === 'form' ? 'bg-gradient-to-r from-teal-500 to-teal-600 text-white shadow-lg transform translate-x-1' : 'text-teal-100/70 hover:bg-white/10 hover:text-white'}`}><i className="fas fa-edit w-5 text-center text-lg"></i> Perekodan PBD</button>
                                    <button onClick={() => setActiveTab('sumatif')} className={`w-full flex items-center gap-4 px-4 py-3.5 rounded-xl text-sm font-bold transition-all duration-300 ${activeTab === 'sumatif' ? 'bg-gradient-to-r from-indigo-500 to-blue-600 text-white shadow-lg transform translate-x-1' : 'text-teal-100/70 hover:bg-white/10 hover:text-white'}`}><i className="fas fa-file-signature w-5 text-center text-lg"></i> Markah Sumatif</button>
                                    <button onClick={() => setActiveTab('urus')} className={`w-full flex items-center gap-4 px-4 py-3.5 rounded-xl text-sm font-bold transition-all duration-300 ${activeTab === 'urus' ? 'bg-gradient-to-r from-purple-500 to-pink-600 text-white shadow-lg transform translate-x-1' : 'text-teal-100/70 hover:bg-white/10 hover:text-white'}`}><i className="fas fa-list-ul w-5 text-center text-lg"></i> Urus & Sunting Rekod</button>
                                    <button onClick={() => setActiveTab('config')} className={`w-full flex items-center gap-4 px-4 py-3.5 rounded-xl text-sm font-bold transition-all duration-300 ${activeTab === 'config' ? 'bg-gradient-to-r from-amber-500 to-orange-500 text-white shadow-lg transform translate-x-1' : 'text-teal-100/70 hover:bg-white/10 hover:text-white'}`}><i className="fas fa-cogs w-5 text-center text-lg"></i> Pengurusan Data</button>
                                </>
                            )}
                            
                            <p className="text-xs font-bold text-teal-500 mb-3 mt-6 px-2 uppercase tracking-widest">Laporan</p>
                            <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center gap-4 px-4 py-3.5 rounded-xl text-sm font-bold transition-all duration-300 ${activeTab === 'dashboard' ? 'bg-gradient-to-r from-teal-500 to-teal-600 text-white shadow-lg transform translate-x-1' : 'text-teal-100/70 hover:bg-white/10 hover:text-white'}`}><i className="fas fa-chart-line w-5 text-center text-lg"></i> Matriks Analisis</button>
                            <button onClick={() => setActiveTab('slip')} className={`w-full flex items-center gap-4 px-4 py-3.5 rounded-xl text-sm font-bold transition-all duration-300 ${activeTab === 'slip' ? 'bg-gradient-to-r from-rose-500 to-red-600 text-white shadow-lg transform translate-x-1' : 'text-teal-100/70 hover:bg-white/10 hover:text-white'}`}><i className="fas fa-id-card-alt w-5 text-center text-lg"></i> Slip Murid</button>
                        </div>

                        <div className="p-5 bg-black/30 backdrop-blur-md relative z-10">
                            <div className="flex items-center gap-3 mb-4 bg-white/5 p-3 rounded-xl border border-white/10">
                                <div className="w-10 h-10 rounded-full bg-teal-500 flex items-center justify-center text-lg shadow-inner text-white font-bold"><i className="fas fa-user-circle"></i></div>
                                <div className="overflow-hidden"><p className="text-sm font-bold truncate text-white">{user.name}</p><p className="text-[10px] text-emerald-400 flex items-center gap-1 font-extrabold tracking-wider uppercase"><span className="w-2 h-2 rounded-full bg-emerald-500 block animate-pulse"></span> Dalam Talian</p></div>
                            </div>
                            <button onClick={handleLogout} className="w-full text-center text-sm text-red-200 hover:text-white hover:bg-red-500/80 py-3 rounded-xl transition-all flex items-center justify-center gap-2 font-bold border border-red-500/30 hover:border-transparent"><i className="fas fa-sign-out-alt"></i> Log Keluar Sistem</button>
                        </div>
                    </div>

                    <div className="flex-1 flex flex-col overflow-hidden h-full relative print-area w-full bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-fixed">
                        <header className="glass-header shadow-sm px-8 py-5 flex justify-between items-center no-print z-10 shrink-0 border-b border-gray-200/50">
                            <div>
                                <h2 className="text-2xl font-black text-gray-800 tracking-tight">
                                    {activeTab === 'form' ? 'Modul Kemasukan Data PBD' : activeTab === 'sumatif' ? 'Modul Markah Ujian (Sumatif)' : activeTab === 'config' ? 'Tetapan Sistem Pusat' : activeTab === 'urus' ? 'Pengurusan & Suntingan Rekod' : activeTab === 'dashboard' ? 'Laporan & Analisis Prestasi' : 'Cetakan Slip Individu'}
                                </h2>
                                <p className="text-sm text-gray-500 font-medium mt-0.5">{new Date().toLocaleDateString('ms-MY', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</p>
                            </div>
                            <div className="hidden md:flex items-center gap-3">
                                <span className="flex h-3 w-3 relative">
                                  <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                  <span className="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                                </span>
                                <span className="text-xs text-gray-600 font-extrabold uppercase tracking-wider bg-white py-2 px-4 rounded-full border border-gray-200 shadow-sm flex items-center gap-2"><i className="fas fa-cloud text-emerald-500"></i> Cloud Auto-Save Aktif</span>
                            </div>
                        </header>

                        <main className="flex-1 overflow-x-hidden overflow-y-auto p-4 md:p-8 print-area">
                            <div className="max-w-7xl mx-auto h-full">
                                {activeTab === 'config' && user.role === 'admin' && <PengurusanData config={config} onUpdateConfig={handleUpdateConfig} showToast={showToast} />}
                                {activeTab === 'form' && user.role === 'admin' && <BorangRekod showToast={showToast} user={user} config={config} onRecordAdded={handleRecordAdded} />}
                                {activeTab === 'sumatif' && user.role === 'admin' && <BorangSumatif showToast={showToast} user={user} config={config} onRecordAdded={handleRecordAdded} />}
                                {activeTab === 'urus' && user.role === 'admin' && <SenaraiRekod records={records} config={config} onRecordUpdated={handleRecordUpdated} onRecordDeleted={handleRecordDeleted} showToast={showToast} />}
                                {activeTab === 'dashboard' && <DashboardAnalisis records={records} config={config} />}
                                {activeTab === 'slip' && <SlipIndividu records={records} config={config} />}
                            </div>
                        </main>
                        
                        <footer className="glass-header border-t border-gray-200/50 py-4 text-center text-xs font-bold text-gray-400 uppercase tracking-widest no-print shrink-0">
                            &copy; 2026 Hak Cipta Terpelihara • Sistem Perekodan PBD • Disediakan Oleh Cikgu Amirul
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
