<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Rekod Perkembangan Murid</title>
    
    <!-- Fonts & Tailwind -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>

    <!-- html2pdf.js untuk muat turun PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        primary: '#0d9488', // Teal 600
                        secondary: '#0f766e',
                        dark: '#042f2e', // Teal 950
                        light: '#f0fdfa',
                        sumatif: '#4338ca', // Indigo 700
                        sumatifLight: '#e0e7ff'
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(0,0,0,0.08)',
                        'glow': '0 0 20px rgba(13, 148, 136, 0.3)'
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f4f7f6; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* TUKAR SEMUA TEKS KE HITAM PEKAT & TEBAL SEMASA CETAK PDF */
        .force-black-print * {
            color: #000000 !important;
            opacity: 1 !important;
            -webkit-text-fill-color: #000000 !important;
            text-shadow: none !important;
            font-weight: 900 !important; /* Paksa semua tulisan jadi sangat tebal */
        }
        .force-black-print table, 
        .force-black-print th, 
        .force-black-print td {
            border-color: #000000 !important;
            border-width: 2px !important; /* Paksa garisan jadi tebal */
            border-style: solid !important;
        }

        @media print {
            body { background-color: white !important; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .print-area { width: 100% !important; margin: 0 !important; padding: 0 !important; box-shadow: none !important; }
            @page { margin: 1cm; size: landscape; }
            .page-break { page-break-before: always; }
            
            /* JIKA CIKGU GUNA CTRL+P, KOD INI AKAN HITAMKAN TULISAN JUGA */
            #dashboard-print-area *, #sumatif-print-area *, #slip-print-content * {
                color: #000000 !important;
                opacity: 1 !important;
                -webkit-text-fill-color: #000000 !important;
            }
            #dashboard-print-area table, #sumatif-print-area table, #slip-print-content table,
            #dashboard-print-area th, #dashboard-print-area td, 
            #sumatif-print-area th, #sumatif-print-area td,
            #slip-print-content th, #slip-print-content td { 
                border: 1px solid #000000 !important; 
            }
            
            #slip-print-content { transform: scale(0.95); transform-origin: top left; }
        }
        
        .toast-enter { animation: slideInRight 0.3s ease-out forwards; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        // =========================================================================
        // URL WEB APP GOOGLE APPS SCRIPT CIKGU
        // =========================================================================
        const GAS_URL = "https://script.google.com/macros/s/AKfycbz95f8JTZG8cdUQEzP-n5_ZS7D-qd9LeadOfzlEAqn9QxCAEA3b9XXSkNzF9yYLcyLxEQ/exec";
        
        const { useState, useEffect, useMemo } = React;

        const getMYDate = () => {
            const d = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Kuala_Lumpur"}));
            return d.toISOString().split('T')[0];
        };

        const formatMYDate = (dateStr) => {
            try {
                return new Date(dateStr).toLocaleDateString('ms-MY', { timeZone: 'Asia/Kuala_Lumpur', day: '2-digit', month: '2-digit', year: 'numeric' });
            } catch { return dateStr; }
        };

        const getGradeInfo = (mark) => {
            if (mark === '' || mark === null) return { grade: '-', desc: '', color: 'bg-gray-100 text-gray-400' };
            const m = parseFloat(mark);
            if (m >= 82) return { grade: 'A', desc: 'CEMERLANG', color: 'bg-emerald-500 text-white' };
            if (m >= 66) return { grade: 'B', desc: 'KEPUJIAN', color: 'bg-blue-500 text-white' };
            if (m >= 50) return { grade: 'C', desc: 'BAIK', color: 'bg-teal-500 text-white' };
            if (m >= 35) return { grade: 'D', desc: 'MEMUASKAN', color: 'bg-amber-500 text-white' };
            if (m >= 20) return { grade: 'E', desc: 'MENCAPAI TAHAP MIN.', color: 'bg-orange-500 text-white' };
            return { grade: 'F', desc: 'BELUM MENCAPAI TAHAP', color: 'bg-red-600 text-white' };
        };

        const TP_OPTIONS = ["TP 1", "TP 2", "TP 3", "TP 4", "TP 5", "TP 6", "BM", "MDB", "M", "TH", "PEMULIHAN", "/", "X"];

        const getTPColor = (tpVal) => {
            const v = tpVal.toUpperCase().trim();
            if (['TP 1', 'TP 2', 'BM', 'X'].includes(v)) return 'text-red-700 bg-red-50 border-red-200';
            if (['TP 3', 'TP 4', 'MDB'].includes(v)) return 'text-amber-700 bg-amber-50 border-amber-200';
            if (['TP 5', 'TP 6', 'M', '/'].includes(v)) return 'text-emerald-700 bg-emerald-50 border-emerald-200';
            if (['TH', 'PEMULIHAN'].includes(v)) return 'text-slate-700 bg-slate-50 border-slate-300';
            return 'text-teal-700 bg-teal-50 border-teal-200';
        };

        const compareSP = (spA, spB) => {
            const partsA = spA.match(/\d+/g) || [];
            const partsB = spB.match(/\d+/g) || [];
            if(partsA.length === 0 && partsB.length > 0) return 1;
            if(partsB.length === 0 && partsA.length > 0) return -1;
            for(let i=0; i<Math.max(partsA.length, partsB.length); i++) {
                const numA = parseInt(partsA[i] || 0, 10);
                const numB = parseInt(partsB[i] || 0, 10);
                if(numA !== numB) return numA - numB;
            }
            return spA.localeCompare(spB);
        };

        const Toast = ({ message, type, onClose }) => {
            useEffect(() => { const timer = setTimeout(onClose, 3000); return () => clearTimeout(timer); }, [onClose]);
            const bgColor = type === 'success' ? 'bg-emerald-600' : type === 'error' ? 'bg-red-500' : 'bg-blue-600';
            const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle';
            return (
                <div className={`fixed top-6 right-6 ${bgColor} text-white px-6 py-4 rounded-xl shadow-xl flex items-center gap-3 z-50 toast-enter no-print`}>
                    <i className={`fas ${icon} text-xl`}></i>
                    <span className="font-semibold">{message}</span>
                </div>
            );
        };

        const LoginScreen = ({ onLogin }) => {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');

            const handleAdminLogin = (e) => {
                e.preventDefault();
                if (username === 'amirul2026' && password === '2026') {
                    onLogin({ role: 'admin', name: 'Cikgu Amirul' });
                } else {
                    setError('ID Pengguna atau Kata Laluan salah.');
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-teal-50">
                    <div className="absolute inset-0 bg-gradient-to-br from-teal-900 via-dark to-black opacity-90 flex flex-col justify-center items-center">
                        <div className="relative z-10 w-full max-w-md p-10 bg-white/95 backdrop-blur-md rounded-3xl shadow-2xl mx-4 transform transition-all fade-in">
                            <div className="text-center mb-8">
                                <div className="bg-gradient-to-tr from-teal-500 to-primary text-white w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-glow transform -rotate-3">
                                    <i className="fas fa-chart-line text-4xl transform rotate-3"></i>
                                </div>
                                <h1 className="text-3xl font-extrabold text-gray-800 tracking-tight">Sistem PBD</h1>
                                <p className="text-teal-600 font-medium mt-2">Urusan Pentaksiran Lebih Mudah</p>
                            </div>
                            
                            {error && <div className="bg-red-50 text-red-600 p-3 rounded-xl mb-6 text-sm text-center font-bold border border-red-100"><i className="fas fa-times-circle mr-1"></i> {error}</div>}
                            
                            <form onSubmit={handleAdminLogin} className="space-y-5">
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-1.5 ml-1">ID Pengguna</label>
                                    <div className="relative">
                                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><i className="fas fa-user text-teal-500"></i></div>
                                        <input type="text" value={username} onChange={e => setUsername(e.target.value)} className="w-full pl-11 pr-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl focus:ring-4 focus:ring-teal-500/20 focus:border-teal-500 outline-none transition-all font-medium" placeholder="Masukkan ID" />
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-1.5 ml-1">Kata Laluan</label>
                                    <div className="relative">
                                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><i className="fas fa-lock text-teal-500"></i></div>
                                        <input type="password" value={password} onChange={e => setPassword(e.target.value)} className="w-full pl-11 pr-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl focus:ring-4 focus:ring-teal-500/20 focus:border-teal-500 outline-none transition-all font-medium" placeholder="Masukkan Kata Laluan" />
                                    </div>
                                </div>
                                <button type="submit" className="w-full bg-gradient-to-r from-teal-500 to-primary hover:from-teal-600 hover:to-teal-700 text-white font-bold py-3.5 rounded-xl transition duration-300 shadow-lg shadow-teal-500/30 transform hover:-translate-y-0.5">
                                    Log Masuk Admin
                                </button>
                            </form>
                            
                            <div className="mt-8 border-t border-gray-100 pt-6 text-center">
                                <p className="text-xs text-gray-500 font-semibold uppercase tracking-wider mb-3">Untuk Pelawat & Ibu Bapa</p>
                                <button onClick={() => onLogin({ role: 'user', name: 'Pengguna Awam' })} className="w-full bg-white border-2 border-gray-100 hover:border-teal-100 hover:bg-teal-50 text-gray-600 font-bold py-3 rounded-xl transition duration-300 flex justify-center items-center gap-2">
                                    <i className="fas fa-search text-teal-500"></i> Lihat Analisis & Slip
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const PengurusanData = ({ config, onUpdateConfig, showToast }) => {
            const [newClass, setNewClass] = useState('');
            const [newSubject, setNewSubject] = useState('');
            const [selClass, setSelClass] = useState('');
            const [newStudent, setNewStudent] = useState('');
            
            const [selSubSyllabus, setSelSubSyllabus] = useState('');
            const [newSK, setNewSK] = useState('');
            const [newSP, setNewSP] = useState('');
            const [newKemahiran, setNewKemahiran] = useState('');

            useEffect(() => {
                if (!selClass && config.classes.length > 0) setSelClass(config.classes[0]);
                if (!selSubSyllabus && config.subjects.length > 0) setSelSubSyllabus(config.subjects[0]);
            }, [config.classes, config.subjects, selClass, selSubSyllabus]);

            const updateData = (newData, msg) => {
                onUpdateConfig(newData);
                showToast(msg, 'success');
            };

            return (
                 <div className="space-y-6 fade-in print-area">
                    <div className="bg-white p-6 rounded-2xl shadow-soft border border-gray-100">
                        <div className="flex items-center gap-3 mb-6">
                            <div className="bg-primary/10 text-primary w-10 h-10 rounded-lg flex items-center justify-center"><i className="fas fa-cogs text-xl"></i></div>
                            <h2 className="text-xl font-bold text-gray-800">Pengurusan Data Utama</h2>
                        </div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div className="bg-gray-50 p-5 rounded-xl border border-gray-100">
                                <h3 className="font-bold text-gray-700 mb-4 flex items-center gap-2"><i className="fas fa-door-open text-teal-500"></i> Senarai Kelas</h3>
                                <div className="flex gap-2 mb-4">
                                    <input type="text" value={newClass} onChange={e=>setNewClass(e.target.value)} placeholder="Nama Kelas Baru" className="flex-1 p-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none bg-white font-medium" />
                                    <button onClick={() => {
                                        if(!newClass) return;
                                        if(config.classes.includes(newClass.toUpperCase())) return showToast('Kelas sudah wujud', 'error');
                                        updateData({...config, classes: [...config.classes, newClass.toUpperCase()], students: {...config.students, [newClass.toUpperCase()]: []}}, 'Kelas berjaya ditambah');
                                        setNewClass('');
                                    }} className="bg-teal-600 text-white px-4 py-2 rounded-lg shadow hover:bg-teal-700 transition"><i className="fas fa-plus"></i></button>
                                </div>
                                <ul className="space-y-2 max-h-40 overflow-y-auto pr-2">
                                    {config.classes.map(c => (
                                        <li key={c} className="flex justify-between items-center bg-white p-3 rounded-lg border border-gray-100 shadow-sm">
                                            <span className="font-bold text-gray-700">{c}</span>
                                            <button onClick={() => {
                                                const newC = config.classes.filter(x => x !== c);
                                                const newS = {...config.students}; delete newS[c];
                                                updateData({...config, classes: newC, students: newS}, `Kelas ${c} dipadam`);
                                            }} className="text-red-400 hover:text-red-600 hover:bg-red-50 p-1.5 rounded transition"><i className="fas fa-trash"></i></button>
                                        </li>
                                    ))}
                                </ul>
                            </div>

                            <div className="bg-gray-50 p-5 rounded-xl border border-gray-100">
                                <h3 className="font-bold text-gray-700 mb-4 flex items-center gap-2"><i className="fas fa-book text-teal-500"></i> Senarai Mata Pelajaran</h3>
                                <div className="flex gap-2 mb-4">
                                    <input type="text" value={newSubject} onChange={e=>setNewSubject(e.target.value)} placeholder="Subjek Baru" className="flex-1 p-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none bg-white font-medium" />
                                    <button onClick={() => {
                                        if(!newSubject) return;
                                        if(config.subjects.includes(newSubject.toUpperCase())) return showToast('Subjek sudah wujud', 'error');
                                        updateData({...config, subjects: [...config.subjects, newSubject.toUpperCase()]}, 'Subjek berjaya ditambah');
                                        setNewSubject('');
                                    }} className="bg-teal-600 text-white px-4 py-2 rounded-lg shadow hover:bg-teal-700 transition"><i className="fas fa-plus"></i></button>
                                </div>
                                <ul className="space-y-2 max-h-40 overflow-y-auto pr-2">
                                    {config.subjects.map(s => (
                                        <li key={s} className="flex justify-between items-center bg-white p-3 rounded-lg border border-gray-100 shadow-sm">
                                            <span className="font-bold text-gray-700">{s}</span>
                                            <button onClick={() => updateData({...config, subjects: config.subjects.filter(x => x !== s)}, 'Subjek dipadam')} className="text-red-400 hover:text-red-600 hover:bg-red-50 p-1.5 rounded transition"><i className="fas fa-trash"></i></button>
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        </div>
                    </div>

                    <div className="bg-white p-6 rounded-2xl shadow-soft border border-gray-100 fade-in">
                        <div className="flex items-center gap-3 mb-6">
                            <div className="bg-blue-100 text-blue-600 w-10 h-10 rounded-lg flex items-center justify-center"><i className="fas fa-users text-xl"></i></div>
                            <h3 className="text-xl font-bold text-gray-800">Daftar Senarai Murid</h3>
                        </div>
                        
                        <div className="flex flex-col md:flex-row gap-4 mb-6 bg-gray-50 p-4 rounded-xl border border-gray-100">
                            <select value={selClass} onChange={e=>setSelClass(e.target.value)} className="p-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white font-bold md:w-1/4">
                                <option value="">-- Pilih Kelas --</option>
                                {config.classes.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                            <input type="text" value={newStudent} onChange={e=>setNewStudent(e.target.value)} placeholder="Nama Murid (Cth: ALI BIN ABU)" className="flex-1 p-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white font-medium" />
                            <button onClick={() => {
                                if(!selClass || !newStudent) return showToast('Pilih kelas dan masukkan nama', 'error');
                                const id = Date.now().toString();
                                const list = config.students[selClass] || [];
                                updateData({...config, students: {...config.students, [selClass]: [...list, {id, name: newStudent.toUpperCase()}]}}, 'Murid berjaya didaftar');
                                setNewStudent('');
                            }} className="bg-blue-600 text-white px-6 py-3 rounded-lg shadow hover:bg-blue-700 transition flex items-center justify-center gap-2 font-bold whitespace-nowrap"><i className="fas fa-user-plus"></i> Tambah Murid</button>
                        </div>
                        
                        {selClass && (
                            <div className="overflow-hidden border border-gray-200 rounded-xl shadow-sm">
                                <table className="w-full text-left text-sm">
                                    <thead className="bg-gray-50 border-b border-gray-200">
                                        <tr><th className="p-4 w-16 text-center font-bold text-gray-500">Bil</th><th className="p-4 font-bold text-gray-500 uppercase tracking-wider">Nama Murid</th><th className="p-4 w-24 text-center font-bold text-gray-500">Tindakan</th></tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-100">
                                        {(config.students[selClass] || []).map((m, i) => (
                                            <tr key={m.id} className="hover:bg-blue-50/50 transition">
                                                <td className="p-4 text-center text-gray-500 font-medium">{i+1}</td>
                                                <td className="p-4 font-bold text-gray-800">{m.name}</td>
                                                <td className="p-4 text-center">
                                                    <button onClick={() => {
                                                        const list = config.students[selClass].filter(x => x.id !== m.id);
                                                        updateData({...config, students: {...config.students, [selClass]: list}}, 'Data murid dipadam');
                                                    }} className="text-red-400 hover:text-red-600 bg-white hover:bg-red-50 p-2 border border-gray-100 rounded-lg transition shadow-sm" title="Padam"><i className="fas fa-trash"></i></button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>

                    <div className="bg-white p-6 rounded-2xl shadow-soft border border-gray-100 fade-in">
                        <div className="flex items-center gap-3 mb-6">
                            <div className="bg-indigo-100 text-indigo-600 w-10 h-10 rounded-lg flex items-center justify-center"><i className="fas fa-list-ol text-xl"></i></div>
                            <h3 className="text-xl font-bold text-gray-800">Daftar Standard Kandungan & Pembelajaran</h3>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-5 gap-3 mb-6 bg-gray-50 p-4 rounded-xl border border-gray-100">
                            <select value={selSubSyllabus} onChange={e=>setSelSubSyllabus(e.target.value)} className="p-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none bg-white font-bold">
                                <option value="">-- Pilih Subjek --</option>
                                {config.subjects.map(s => <option key={s} value={s}>{s}</option>)}
                            </select>
                            <input type="text" value={newSK} onChange={e=>setNewSK(e.target.value)} placeholder="SK (Cth: 1.1 Nombor Bulat)" className="p-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none bg-white font-medium" />
                            <input type="text" value={newSP} onChange={e=>setNewSP(e.target.value)} placeholder="SP (Cth: 1.1.1)" className="p-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none bg-white font-medium" />
                            <input type="text" value={newKemahiran} onChange={e=>setNewKemahiran(e.target.value)} placeholder="Kemahiran Asas" className="p-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none bg-white font-medium" />
                            <button onClick={() => {
                                if(!selSubSyllabus || !newSK || !newSP || !newKemahiran) return showToast('Sila isi semua ruangan standard', 'error');
                                const id = Date.now().toString();
                                const currentSyllabus = config.syllabus || {};
                                const list = currentSyllabus[selSubSyllabus] || [];
                                updateData({...config, syllabus: {...currentSyllabus, [selSubSyllabus]: [...list, {id, sk: newSK, sp: newSP, kemahiran: newKemahiran}]}}, 'Standard ditambah');
                                setNewSK(''); setNewSP(''); setNewKemahiran('');
                            }} className="bg-indigo-600 text-white px-4 py-3 rounded-lg shadow hover:bg-indigo-700 transition flex items-center justify-center gap-2 font-bold whitespace-nowrap"><i className="fas fa-plus"></i> Tambah</button>
                        </div>

                        {selSubSyllabus && (
                            <div className="overflow-hidden border border-gray-200 rounded-xl shadow-sm">
                                <table className="w-full text-left text-sm">
                                    <thead className="bg-gray-50 border-b border-gray-200">
                                        <tr><th className="p-4 w-16 text-center font-bold text-gray-500">Bil</th><th className="p-4 font-bold text-gray-500">SK</th><th className="p-4 font-bold text-gray-500">SP</th><th className="p-4 font-bold text-gray-500">Kemahiran</th><th className="p-4 w-24 text-center font-bold text-gray-500">Tindakan</th></tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-100">
                                        {((config.syllabus && config.syllabus[selSubSyllabus]) || []).map((item, i) => (
                                            <tr key={item.id} className="hover:bg-indigo-50/50 transition">
                                                <td className="p-4 text-center text-gray-500 font-medium">{i+1}</td>
                                                <td className="p-4 font-bold text-gray-800">{item.sk}</td>
                                                <td className="p-4 font-bold text-indigo-700">{item.sp}</td>
                                                <td className="p-4 text-gray-600">{item.kemahiran}</td>
                                                <td className="p-4 text-center"><button onClick={() => {
                                                        const currentSyllabus = config.syllabus || {};
                                                        const list = currentSyllabus[selSubSyllabus].filter(x => x.id !== item.id);
                                                        updateData({...config, syllabus: {...currentSyllabus, [selSubSyllabus]: list}}, 'Standard dipadam');
                                                    }} className="text-red-400 hover:text-red-600 bg-white hover:bg-red-50 p-2 border border-gray-100 rounded-lg transition shadow-sm"><i className="fas fa-trash"></i></button></td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>
                 </div>
            );
        };

        const BorangRekod = ({ showToast, user, config, onRecordAdded }) => {
            if (!config.classes.length || !config.subjects.length) {
                return (
                    <div className="bg-white rounded-2xl shadow-soft border border-gray-100 p-12 text-center fade-in">
                        <div className="w-24 h-24 bg-amber-100 text-amber-500 rounded-full flex items-center justify-center mx-auto mb-6"><i className="fas fa-exclamation-triangle text-5xl"></i></div>
                        <h2 className="text-2xl font-bold mb-3 text-gray-800">Maklumat Asas Diperlukan</h2>
                        <p className="text-gray-500 mb-6">Sila ke menu <strong className="text-gray-700">Pengurusan Data</strong> untuk mendaftar Mata Pelajaran & Kelas terlebih dahulu.</p>
                    </div>
                );
            }

            const [mod, setMod] = useState('SP');
            const [formData, setFormData] = useState({
                tarikh: getMYDate(), subjek: config.subjects[0] || '', kelas: config.classes[0] || '',
                stdKandungan: '', stdPembelajaran: '', kemahiran: '', selectedSyllabusId: '',
                selectedSKs: []
            });
            const [results, setResults] = useState({});
            const [isSaving, setIsSaving] = useState(false);

            useEffect(() => {
                const initialResults = {};
                const studentList = config.students[formData.kelas] || [];
                studentList.forEach(s => { initialResults[s.id] = ''; });
                setResults(initialResults);
            }, [formData.kelas, config.students]);

            const uniqueSKs = useMemo(() => {
                const syllabusList = (config.syllabus && config.syllabus[formData.subjek]) || [];
                return [...new Set(syllabusList.map(item => item.kemahiran))];
            }, [config.syllabus, formData.subjek]);

            const handleModeChange = (newMod) => {
                setMod(newMod);
                setFormData(prev => ({ ...prev, stdKandungan: '', stdPembelajaran: '', kemahiran: '', selectedSyllabusId: '', selectedSKs: [] }));
            };

            const toggleSK = (sk) => {
                setFormData(prev => {
                    const current = prev.selectedSKs;
                    if(current.includes(sk)) return { ...prev, selectedSKs: current.filter(x => x !== sk) };
                    return { ...prev, selectedSKs: [...current, sk] };
                });
            };

            const handleSave = async () => {
                let finalKandungan = formData.stdKandungan;
                let finalPembelajaran = formData.stdPembelajaran;
                let finalKemahiran = formData.kemahiran;

                if (mod === 'SP') {
                    if (!formData.selectedSyllabusId) return showToast('Sila pilih Standard Pembelajaran.', 'error');
                } else if (mod === 'SK' || mod === 'PPT' || mod === 'PAT') {
                    if (formData.selectedSKs.length === 0) return showToast('Sila pilih sekurang-kurangnya satu Kemahiran/Tajuk.', 'error');
                    
                    setIsSaving(true);
                    try {
                        const studentsData = config.students[formData.kelas] || [];
                        const detailedResults = Object.keys(results).map(id => {
                            const student = studentsData.find(s => s.id === id);
                            return { studentId: id, studentName: student ? student.name : 'Unknown', tp: results[id] || 'Belum Dinilai' };
                        });

                        const promises = formData.selectedSKs.map(kem => {
                            let spPrefix = 'TP KESELURUHAN';
                            if (mod === 'PPT') spPrefix = 'TP KESELURUHAN (PPT)';
                            if (mod === 'PAT') spPrefix = 'TP KESELURUHAN (PAT)';
                            
                            const newRecord = { 
                                ...formData, 
                                stdKandungan: '-', 
                                stdPembelajaran: `${spPrefix}: ${kem}`, 
                                kemahiran: kem,
                                results: detailedResults, createdAt: new Date().toISOString(), createdBy: user.name 
                            };
                            return fetch(GAS_URL, {
                                method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                                body: JSON.stringify({ action: 'addAssessment', assessment: newRecord })
                            }).then(r => r.json()).then(resData => {
                                if(resData.success) {
                                    newRecord.id = resData.id;
                                    onRecordAdded(newRecord);
                                } else throw new Error(resData.error);
                            });
                        });
                        
                        await Promise.all(promises);
                        showToast('Semua rekod berjaya disimpan!', 'success');
                        setFormData(prev => ({ ...prev, stdKandungan: '', stdPembelajaran: '', kemahiran: '', selectedSyllabusId: '', selectedSKs: [] }));
                        const resetRes = {}; studentsData.forEach(s => resetRes[s.id] = '');
                        setResults(resetRes);
                    } catch (error) { showToast('Ralat: ' + error.message, 'error'); } 
                    finally { setIsSaving(false); }
                    return;
                }

                setIsSaving(true);
                try {
                    const studentsData = config.students[formData.kelas] || [];
                    const detailedResults = Object.keys(results).map(id => {
                        const student = studentsData.find(s => s.id === id);
                        return { studentId: id, studentName: student ? student.name : 'Unknown', tp: results[id] || 'Belum Dinilai' };
                    });

                    const newRecord = { 
                        ...formData, stdKandungan: finalKandungan, stdPembelajaran: finalPembelajaran, kemahiran: finalKemahiran,
                        results: detailedResults, createdAt: new Date().toISOString(), createdBy: user.name 
                    };
                    
                    const response = await fetch(GAS_URL, {
                        method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: 'addAssessment', assessment: newRecord })
                    });
                    const resData = await response.json();
                    
                    if(resData.success) {
                        newRecord.id = resData.id;
                        showToast('Rekod berjaya disimpan!', 'success');
                        onRecordAdded(newRecord);
                        setFormData(prev => ({ ...prev, stdKandungan: '', stdPembelajaran: '', kemahiran: '', selectedSyllabusId: '', selectedSKs: [] }));
                        const resetRes = {}; studentsData.forEach(s => resetRes[s.id] = '');
                        setResults(resetRes);
                    } else throw new Error(resData.error || "Ralat Pelayan Google Sheets");
                } catch (error) { showToast('Ralat: ' + error.message, 'error'); } 
                finally { setIsSaving(false); }
            };

            return (
                <div className="bg-white rounded-2xl shadow-soft border border-gray-100 p-8 fade-in">
                    <div className="flex items-center gap-4 mb-8 border-b border-gray-100 pb-6">
                        <div className="bg-gradient-to-tr from-teal-500 to-primary text-white w-12 h-12 rounded-xl flex items-center justify-center shadow-lg"><i className="fas fa-edit text-xl"></i></div>
                        <div>
                            <h2 className="text-2xl font-bold text-gray-800">Borang Rekod PBD (Formatif)</h2>
                            <p className="text-gray-500 text-sm font-medium">Rekod pentaksiran harian dan keseluruhan</p>
                        </div>
                    </div>
                    
                    <div className="mb-8">
                        <label className="block text-sm font-extrabold text-gray-800 mb-3 uppercase tracking-wider">Pilih Mod Perekodan:</label>
                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
                            <button onClick={()=>handleModeChange('SP')} className={`py-4 px-4 rounded-xl font-bold text-sm border-2 transition-all flex flex-col items-center justify-center gap-2 ${mod==='SP' ? 'border-teal-500 bg-teal-50 text-teal-800 shadow-md transform -translate-y-1' : 'border-gray-200 bg-white text-gray-500 hover:border-teal-300 hover:bg-teal-50/50'}`}><i className={`fas fa-book-open text-xl ${mod==='SP' ? 'text-teal-600' : 'text-gray-400'}`}></i> 1. Standard Pembelajaran</button>
                            <button onClick={()=>handleModeChange('SK')} className={`py-4 px-4 rounded-xl font-bold text-sm border-2 transition-all flex flex-col items-center justify-center gap-2 ${mod==='SK' ? 'border-teal-500 bg-teal-50 text-teal-800 shadow-md transform -translate-y-1' : 'border-gray-200 bg-white text-gray-500 hover:border-teal-300 hover:bg-teal-50/50'}`}><i className={`fas fa-layer-group text-xl ${mod==='SK' ? 'text-teal-600' : 'text-gray-400'}`}></i> 2. TP Keseluruhan (Semasa)</button>
                            <button onClick={()=>handleModeChange('PPT')} className={`py-4 px-4 rounded-xl font-bold text-sm border-2 transition-all flex flex-col items-center justify-center gap-2 ${mod==='PPT' ? 'border-blue-500 bg-blue-50 text-blue-800 shadow-md transform -translate-y-1' : 'border-gray-200 bg-white text-gray-500 hover:border-blue-300 hover:bg-blue-50/50'}`}><i className={`fas fa-calendar-alt text-xl ${mod==='PPT' ? 'text-blue-600' : 'text-gray-400'}`}></i> 3. TP Keseluruhan (PPT)</button>
                            <button onClick={()=>handleModeChange('PAT')} className={`py-4 px-4 rounded-xl font-bold text-sm border-2 transition-all flex flex-col items-center justify-center gap-2 ${mod==='PAT' ? 'border-indigo-500 bg-indigo-50 text-indigo-800 shadow-md transform -translate-y-1' : 'border-gray-200 bg-white text-gray-500 hover:border-indigo-300 hover:bg-indigo-50/50'}`}><i className={`fas fa-calendar-check text-xl ${mod==='PAT' ? 'text-indigo-600' : 'text-gray-400'}`}></i> 4. TP Keseluruhan (PAT)</button>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 bg-gray-50/80 p-6 rounded-2xl border border-gray-100 shadow-inner">
                        <div>
                            <label className="block text-sm font-bold text-gray-700 mb-2">Tarikh Penilaian</label>
                            <input type="date" name="tarikh" value={formData.tarikh} onChange={e=>setFormData({...formData, tarikh:e.target.value})} className="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-teal-500 outline-none bg-white font-medium shadow-sm" />
                        </div>
                        <div>
                            <label className="block text-sm font-bold text-gray-700 mb-2">Pilih Kelas</label>
                            <select name="kelas" value={formData.kelas} onChange={e=>setFormData({...formData, kelas:e.target.value})} className="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-teal-500 outline-none bg-white font-bold shadow-sm">
                                {config.classes.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                        </div>
                        <div>
                            <label className="block text-sm font-bold text-gray-700 mb-2">Mata Pelajaran</label>
                            <select name="subjek" value={formData.subjek} onChange={e=>{setFormData({...formData, subjek:e.target.value, stdKandungan:'', stdPembelajaran:'', kemahiran:'', selectedSyllabusId:'', selectedSKs:[]});}} className="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-teal-500 outline-none bg-white font-bold text-teal-800 shadow-sm">
                                {config.subjects.map(s => <option key={s} value={s}>{s}</option>)}
                            </select>
                        </div>
                        
                        <div className="col-span-1 md:col-span-3 pt-2">
                            {mod === 'SP' && (
                                <div className="bg-white p-4 rounded-xl border border-teal-100 shadow-sm">
                                    <label className="block text-sm font-extrabold text-teal-800 mb-2 uppercase tracking-wider"><i className="fas fa-hand-pointer mr-1 text-teal-500"></i> Pilih Standard Pembelajaran (SP)</label>
                                    <select 
                                        value={formData.selectedSyllabusId}
                                        onChange={(e) => {
                                            const selectedId = e.target.value;
                                            if(!selectedId) return setFormData(prev => ({...prev, stdKandungan: '', stdPembelajaran: '', kemahiran: '', selectedSyllabusId: ''}));
                                            const item = ((config.syllabus && config.syllabus[formData.subjek]) || []).find(x => x.id === selectedId);
                                            if(item) setFormData(prev => ({...prev, stdKandungan: item.sk, stdPembelajaran: item.sp, kemahiran: item.kemahiran, selectedSyllabusId: selectedId}));
                                        }}
                                        className="w-full p-3 border-2 border-teal-100 rounded-xl focus:ring-4 focus:ring-teal-500/20 focus:border-teal-500 outline-none bg-white font-bold text-gray-800 transition"
                                    >
                                        <option value="">-- Sila pilih SP daripada senarai --</option>
                                        {((config.syllabus && config.syllabus[formData.subjek]) || []).map(s => (
                                            <option key={s.id} value={s.id}>[SP: {s.sp}] • {s.kemahiran}</option>
                                        ))}
                                    </select>
                                </div>
                            )}

                            {(mod === 'SK' || mod === 'PPT' || mod === 'PAT') && (
                                <div className={`p-5 rounded-xl border shadow-sm ${mod === 'PPT' ? 'bg-blue-50 border-blue-200' : mod === 'PAT' ? 'bg-indigo-50 border-indigo-200' : 'bg-white border-teal-200'}`}>
                                    <label className={`block text-sm font-extrabold mb-3 uppercase tracking-wider ${mod === 'PPT' ? 'text-blue-800' : mod === 'PAT' ? 'text-indigo-800' : 'text-teal-800'}`}>
                                        <i className="fas fa-check-square mr-1"></i> Pilih Kemahiran / Bidang / Tajuk (Boleh pilih > 1)
                                    </label>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3 max-h-48 overflow-y-auto pr-2">
                                        {uniqueSKs.length > 0 ? uniqueSKs.map(sk => (
                                            <label key={sk} className={`flex items-start gap-3 p-3 rounded-lg border-2 cursor-pointer transition-all ${formData.selectedSKs.includes(sk) ? (mod==='PPT'?'border-blue-500 bg-blue-100':mod==='PAT'?'border-indigo-500 bg-indigo-100':'border-teal-500 bg-teal-50') : 'border-gray-200 bg-white hover:border-gray-300'}`}>
                                                <input 
                                                    type="checkbox" 
                                                    checked={formData.selectedSKs.includes(sk)}
                                                    onChange={() => toggleSK(sk)}
                                                    className="w-5 h-5 mt-0.5 text-teal-600 border-gray-300 rounded focus:ring-teal-500"
                                                />
                                                <span className={`text-sm font-bold ${formData.selectedSKs.includes(sk) ? 'text-gray-900' : 'text-gray-600'}`}>{sk}</span>
                                            </label>
                                        )) : <p className="text-gray-400 italic text-sm">Tiada senarai Kemahiran. Sila daftar di Pengurusan Data.</p>}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="overflow-x-auto rounded-xl border border-gray-200 shadow-sm">
                        <table className="w-full text-left border-collapse">
                            <thead>
                                <tr className="bg-gray-100 text-gray-700">
                                    <th className="py-4 px-4 font-bold text-sm w-16 text-center border-b border-gray-200">Bil</th>
                                    <th className="py-4 px-4 font-bold text-sm border-b border-gray-200 uppercase tracking-wider">Nama Murid</th>
                                    <th className="py-4 px-4 font-bold text-sm w-64 text-center border-b border-gray-200 uppercase tracking-wider">Tahap Penguasaan</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-100 bg-white">
                                {config.students[formData.kelas] && config.students[formData.kelas].length > 0 ? config.students[formData.kelas].map((student, index) => (
                                    <tr key={student.id} className="hover:bg-teal-50/30 transition-colors">
                                        <td className="py-3 px-4 text-center text-gray-500 font-medium">{index + 1}</td>
                                        <td className="py-3 px-4 font-bold text-gray-800">{student.name}</td>
                                        <td className="py-3 px-4">
                                            <div className="relative">
                                                <select 
                                                    value={results[student.id] || ''} 
                                                    onChange={(e) => setResults(prev => ({ ...prev, [student.id]: e.target.value }))}
                                                    className={`w-full p-2.5 border-2 rounded-xl focus:ring-0 outline-none text-sm font-extrabold appearance-none transition-colors ${results[student.id] ? 'bg-teal-50 border-teal-400 text-teal-800' : 'bg-gray-50 border-gray-200 hover:border-gray-300'}`}
                                                >
                                                    <option value="" disabled>-- Pilih TP --</option>
                                                    {TP_OPTIONS.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                                                </select>
                                                <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-500">
                                                    <i className="fas fa-chevron-down text-xs"></i>
                                                </div>
                                            </div>
                                        </td>
                                    </tr>
                                )) : <tr><td colSpan="3" className="py-8 text-center text-gray-500 italic">Tiada senarai nama murid. Sila daftar di Pengurusan Data.</td></tr>}
                            </tbody>
                        </table>
                    </div>
                    
                    <div className="mt-4 text-xs font-bold text-gray-500 mb-4 bg-gray-50 p-3 rounded-xl border border-gray-200 inline-block">
                        <i className="fas fa-info-circle mr-1"></i> <span className="text-gray-800">PETUNJUK:</span> <strong className="text-red-500">BM</strong> (Belum Menguasai), <strong className="text-amber-500">MDB</strong> (Menguasai Dengan Bimbingan), <strong className="text-emerald-500">M</strong> (Menguasai)
                    </div>

                    <div className="flex justify-end border-t border-gray-100 pt-6">
                        <button onClick={handleSave} disabled={isSaving} className="bg-gradient-to-r from-teal-600 to-dark hover:from-teal-700 hover:to-black text-white font-bold py-3.5 px-10 rounded-xl shadow-lg transform hover:-translate-y-0.5 transition flex items-center gap-2">
                            {isSaving ? <i className="fas fa-spinner fa-spin text-xl"></i> : <i className="fas fa-paper-plane text-xl"></i>}
                            {isSaving ? 'Menyimpan...' : 'Hantar & Simpan Rekod'}
                        </button>
                    </div>
                </div>
            );
        };

        const BorangSumatif = ({ showToast, user, config, onRecordAdded }) => {
            if (!config.classes.length || !config.subjects.length) return <div className="text-center p-10 font-bold text-gray-500">Sila tetapkan data asas dahulu.</div>;

            const [formData, setFormData] = useState({ tarikh: getMYDate(), subjek: config.subjects[0] || '', kelas: config.classes[0] || '', namaUjian: 'UJIAN PERTENGAHAN TAHUN' });
            const [results, setResults] = useState({});
            const [isSaving, setIsSaving] = useState(false);

            useEffect(() => {
                const initialResults = {};
                const studentList = config.students[formData.kelas] || [];
                studentList.forEach(s => { initialResults[s.id] = ''; });
                setResults(initialResults);
            }, [formData.kelas, config.students]);

            const handleSave = async () => {
                if (!formData.namaUjian) return showToast('Sila isikan Nama Ujian.', 'error');
                setIsSaving(true);
                try {
                    const studentsData = config.students[formData.kelas] || [];
                    const detailedResults = Object.keys(results).map(id => {
                        const student = studentsData.find(s => s.id === id);
                        const markah = results[id];
                        let tpValue = 'Belum Dinilai';
                        if(markah !== '') { 
                            const info = getGradeInfo(markah);
                            tpValue = `${markah}% [${info.grade}]`; 
                        }
                        return { studentId: id, studentName: student ? student.name : 'Unknown', tp: tpValue };
                    });

                    const newRecord = { 
                        tarikh: formData.tarikh, subjek: formData.subjek, kelas: formData.kelas,
                        stdKandungan: 'MARKAH UJIAN', stdPembelajaran: formData.namaUjian, kemahiran: '-',
                        results: detailedResults, createdAt: new Date().toISOString(), createdBy: user.name 
                    };
                    
                    const response = await fetch(GAS_URL, {
                        method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: 'addAssessment', assessment: newRecord })
                    });
                    const resData = await response.json();
                    
                    if(resData.success) {
                        newRecord.id = resData.id;
                        showToast('Markah Sumatif berjaya disimpan!', 'success');
                        onRecordAdded(newRecord);
                    } else throw new Error(resData.error || "Ralat Pelayan Google Sheets");
                } catch (error) { showToast('Ralat: ' + error.message, 'error'); } 
                finally { setIsSaving(false); }
            };

            return (
                <div className="bg-white rounded-2xl shadow-soft border border-gray-100 p-8 fade-in relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-sumatif to-indigo-400"></div>
                    
                    <div className="flex items-center gap-4 mb-8 border-b border-gray-100 pb-6 mt-2">
                        <div className="bg-gradient-to-tr from-indigo-600 to-blue-500 text-white w-12 h-12 rounded-xl flex items-center justify-center shadow-lg"><i className="fas fa-award text-xl"></i></div>
                        <div>
                            <h2 className="text-2xl font-bold text-gray-800">Borang Markah Ujian (Sumatif)</h2>
                            <p className="text-gray-500 text-sm font-medium">Rekodkan peratusan dan sistem akan auto-kira gred!</p>
                        </div>
                    </div>
                    
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8 bg-indigo-50/50 p-6 rounded-2xl border border-indigo-100 shadow-inner">
                        <div>
                            <label className="block text-sm font-bold text-gray-700 mb-2">Tarikh Ujian</label>
                            <input type="date" value={formData.tarikh} onChange={e=>setFormData({...formData, tarikh:e.target.value})} className="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none bg-white font-medium" />
                        </div>
                        <div>
                            <label className="block text-sm font-bold text-gray-700 mb-2">Kelas</label>
                            <select value={formData.kelas} onChange={e=>setFormData({...formData, kelas:e.target.value})} className="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none bg-white font-bold">
                                {config.classes.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                        </div>
                        <div>
                            <label className="block text-sm font-bold text-gray-700 mb-2">Mata Pelajaran</label>
                            <select value={formData.subjek} onChange={e=>setFormData({...formData, subjek:e.target.value})} className="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none bg-white font-bold text-indigo-800">
                                {config.subjects.map(s => <option key={s} value={s}>{s}</option>)}
                            </select>
                        </div>
                        <div>
                            <label className="block text-sm font-extrabold text-indigo-800 mb-2 uppercase">Nama Ujian</label>
                            <input type="text" list="ujian-list" value={formData.namaUjian} onChange={e=>setFormData({...formData, namaUjian:e.target.value.toUpperCase()})} className="w-full p-3 border-2 border-indigo-300 rounded-xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none bg-white font-bold text-indigo-900 shadow-sm" placeholder="Cth: UJIAN 1" />
                            <datalist id="ujian-list">
                                <option value="UJIAN SELARAS 1" />

                    <div className="flex justify-end border-t border-gray-100 pt-6">
                        <button onClick={handleSave} disabled={isSaving} className="bg-gradient-to-r from-sumatif to-indigo-500 hover:from-indigo-700 hover:to-indigo-600 text-white font-bold py-3.5 px-10 rounded-xl shadow-lg transform hover:-translate-y-0.5 transition flex items-center gap-2">
